name: Fullstack CI/CD Pipeline - Piyush

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ==========================
  # 1️⃣ TEST JOB
  # ==========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ---------- BACKEND ----------
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Backend Tests
        working-directory: backend
        run: npm test

      # ---------- FRONTEND ----------
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Run Frontend Unit Tests
        working-directory: frontend
        run: npm test

      - name: Run Cypress E2E Tests
        working-directory: frontend
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: https://fullstack-user-crud.vercel.app/


  # ==========================
  # 2️⃣ DEPLOY JOB (GATED)
  # ==========================
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      # 1️⃣ Pull correct Vercel project configuration
      - name: Pull Vercel Environment Information
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # 2️⃣ Build using Vercel (ensures correct config)
      - name: Build Project Artifacts
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # 3️⃣ Deploy prebuilt output
      - name: Deploy to Vercel (Production)
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}