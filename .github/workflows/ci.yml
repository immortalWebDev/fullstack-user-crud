name: Fullstack CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Download your repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Install Node.js on the machine
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22.12.0

      # ---------------------------
      # 🔹 Backend Tests
      # ---------------------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend Jest tests
        run: |
          cd backend
          npm test

      # ---------------------------
      # 🔹 Frontend Tests (Jest + RTL)
      # ---------------------------
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm test

      # ---------------------------
      # 🔹 Cypress E2E Tests
      # ---------------------------
      - name: Run Cypress tests
        run: |
          cd frontend
          npx cypress run
        env:
          CYPRESS_BASE_URL: https://fullstack-user-crud.vercel.app/