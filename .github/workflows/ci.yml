name: Fullstack CI Pipeline - Piyush

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test-piyush:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code - Piyush
        uses: actions/checkout@v3

      - name: Setup Node - Piyush
        uses: actions/setup-node@v3
        with:
          node-version: 22.12.0

      # Backend
      - name: Install Backend Dependencies - Piyush
        run: |
          cd backend
          npm install

      - name: Run Backend Jest Tests - Piyush
        run: |
          cd backend
          npm test

      # Frontend
      - name: Install Frontend Dependencies - Piyush
        run: |
          cd frontend
          npm install

      - name: Run Frontend Unit Tests - Piyush
        run: |
          cd frontend
          npm test

      - name: Run Cypress Tests - Piyush
        run: |
          cd frontend
          npx cypress run
        env:
          CYPRESS_BASE_URL: https://fullstack-user-crud-ci.vercel.app/

  deployment-piyush:
    runs-on: ubuntu-latest
    needs: test-piyush
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Vercel - Piyush (Production)
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        
        