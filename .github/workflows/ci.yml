name: Fullstack CI Pipeline - Piyush

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test-piyush:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code - Piyush
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node - Piyush
        uses: actions/setup-node@v3
        with:
          node-version: 22.12.0

      # ---------------------------
      # 🔹 Backend Tests
      # ---------------------------
      - name: Install Backend Dependencies - Piyush
        run: |
          cd backend
          npm install

      - name: Run Backend Jest Tests - Piyush
        run: |
          cd backend
          npm test

      # ---------------------------
      # 🔹 Frontend Unit Tests
      # ---------------------------
      - name: Install Frontend Dependencies - Piyush
        run: |
          cd frontend
          npm install

      - name: Run Frontend Unit Tests - Piyush
        run: |
          cd frontend
          npm test

      # ---------------------------
      # 🔹 Cypress E2E Tests
      # ---------------------------
      - name: Run Cypress Tests - Piyush
        run: |
          cd frontend
          npx cypress run
        env:
          CYPRESS_BASE_URL: https://fullstack-user-crud.vercel.app/


  deployment-piyush:
    runs-on: ubuntu-latest
    needs: test-piyush
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code for Deployment - Piyush
        uses: actions/checkout@v3

      - name: Install Vercel CLI - Piyush
        run: npm install -g vercel

      - name: Pull Vercel Production Environment - Piyush
        run: |
          cd frontend
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Frontend for Production - Piyush
        run: |
          cd frontend
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Frontend to Vercel - Piyush
        run: |
          cd frontend
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}