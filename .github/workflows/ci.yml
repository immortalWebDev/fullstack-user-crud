name: Fullstack CI Pipeline - Piyush

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test-piyush:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code - Piyush
        uses: actions/checkout@v3

      - name: Setup Node - Piyush
        uses: actions/setup-node@v3
        with:
          node-version: 22.12.0

      # Backend
      - name: Install Backend Dependencies - Piyush
        working-directory: backend
        run: npm install

      - name: Run Backend Jest Tests - Piyush
        working-directory: backend
        run: npm test

      # Frontend
      - name: Install Frontend Dependencies - Piyush
        working-directory: frontend
        run: npm install

      - name: Run Frontend Unit Tests - Piyush
        working-directory: frontend
        run: npm test

      - name: Run Cypress Tests - Piyush
        working-directory: frontend
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: https://fullstack-user-crud.vercel.app/

  deployment-piyush:
    runs-on: ubuntu-latest
    needs: test-piyush
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Pull Vercel Project Settings
        working-directory: frontend
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        working-directory: frontend
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Production)
        working-directory: frontend
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}